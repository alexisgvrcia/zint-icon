<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="index, follow" />
    <meta
      name="googlebot"
      content="index, follow, max-video-preview:-1, max-image-preview:large, max-snippet:-1"
    />
    <title>ZintIcon - Minimalist Gradient Icon Generator</title>
    <link rel="canonical" href="https://zinticon.alexisgvrcia.dev/" />
    <meta
      name="description"
      content="Create minimalist icons with gradient backgrounds directly in your browser and export them as SVG, PNG, or ICO."
    />
    <meta name="author" content="alexisgvrcia" />
    <link rel="author" href="https://alexisgvrcia.dev" />
    <link rel="manifest" href="%sveltekit.assets%/site.webmanifest.json" />

    <link rel="icon" href="%sveltekit.assets%/favicon.ico" />
    <link rel="icon" href="%sveltekit.assets%/icon.svg" type="image/svg+xml" />
    <link
      rel="apple-touch-icon"
      href="%sveltekit.assets%/apple-touch-icon.png"
      type="image/png"
      sizes="180x180"
    />

    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="ZintIcon" />
    <meta property="og:title" content="ZintIcon - Minimalist Gradient Icon Generator" />
    <meta
      property="og:description"
      content="Create minimalist icons with gradient backgrounds directly in your browser and export them as SVG, PNG, or ICO."
    />
    <meta property="og:url" content="https://zinticon.alexisgvrcia.dev/" />
    <meta property="og:image" content="https://zinticon.alexisgvrcia.dev/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="ZintIcon icon generator preview" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="ZintIcon - Minimalist Gradient Icon Generator" />
    <meta
      name="twitter:description"
      content="Create minimalist icons with gradient backgrounds directly in your browser and export them as SVG, PNG, or ICO."
    />
    <meta name="twitter:creator" content="@alexisgvrcia" />
    <meta name="twitter:image" content="https://zinticon.alexisgvrcia.dev/og-image.png" />
    <meta name="twitter:image:width" content="1200" />
    <meta name="twitter:image:height" content="630" />
    <meta name="twitter:image:alt" content="ZintIcon icon generator preview" />

    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "ZintIcon",
        "applicationCategory": "DesignApplication",
        "operatingSystem": "Web",
        "url": "https://zinticon.alexisgvrcia.dev/",
        "image": "https://zinticon.alexisgvrcia.dev/og-image.png",
        "description": "Create minimalist icons with gradient backgrounds directly in your browser and export them as SVG, PNG, or ICO.",
        "creator": {
          "@type": "Person",
          "name": "alexisgvrcia",
          "url": "https://alexisgvrcia.dev"
        },
        "sameAs": ["https://github.com/alexisgvrcia/zint-icon"],
        "featureList": [
          "Generate minimalist icons in the browser",
          "Customize mesh or solid gradient backgrounds",
          "Export icons as SVG, PNG, and ICO"
        ]
      }
    </script>

    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover">
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
